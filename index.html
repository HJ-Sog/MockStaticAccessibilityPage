<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrast Test Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background-color: black;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
            margin-bottom: 80px;
        }

        footer {
            position: fixed;
            left: 0;
            bottom: 0;
            padding: 20px;
            text-align: center;
            width: 100%;
            background-color: black;
            color: white;
        }

        .scheme-1 {
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
        }

        .scheme-2 {
            background-color: rgb(255, 255, 255);
            color: rgb(148, 148, 148);
        }

        img {
            width: 500px;
        }

    </style>
</head>

<body>
    <header>
        Contrast Test Page
    </header>
    <p class="scheme-1">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut
        labore et dolore magna aliqua.</p>
    <p class="scheme-2">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut
        labore et dolore magna aliqua.</p>
    <img alt="sleeping orange cat on floor" src="https://images.pexels.com/photos/256632/pexels-photo-256632.jpeg"/>
    <img alt="dog running" src="https://images.pexels.com/photos/35285291/pexels-photo-35285291.jpeg"/>
    <footer>
        Footer
    </footer>
</body>

</html>
